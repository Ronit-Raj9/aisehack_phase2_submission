experiment:
  name: baseline

paths:
  input_loc: /kaggle/input/competitions/anrf-aise-hack-phase-2-theme-2-pollution-forecasting-iitd/aisehack-theme-2/test_in
  model_path: /kaggle/working/experiments/baseline/checkpoints/best.pt
  output_loc: /kaggle/working/

data:
  ntest: 218
  time_input: 10
  time_out: 16
  S1: 140
  S2: 124

features:
  met_variables_raw:
    - cpm25
    - q2
    - t2
    - u10
    - v10
    - swdown
    - pblh
    - psfc
  persist_met_for_physics:
    - rain
  emission_variables_raw:
    - PM25
    - NH3
    - SO2
    - NOx
    - NMVOC_e
    - NMVOC_finn
    - bio
  derived_variables:
    - wind_speed
    - wind_dir_cos
    - wind_dir_sin
    - rain_occ
    - rain_amt
    - daylight_mask
    - cpm25_delta1
    - cpm25_delta3
    - cpm25_mean3
    - cpm25_mean6
    - cpm25_std10
    - pblh_inverse
    - ventilation_proxy

model:
  modes: 12
  width: 48

inference:
  batch_size: 1

multi_gpu:
  enabled: false
  backend: data_parallel
  min_gpus: 2
  device_ids: null
